<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Catppuccin Background -->
  <rect width="500" height="500" rx="120" fill="#11111b" />
  
  <g transform="translate(250, 250)">
    <!-- Base Orbit Ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#1e1e2e" stroke-width="48" />
    
    <!-- Blue Sweeping Arc (Top Right) -->
    <path d="M 0 -140 A 140 140 0 0 1 140 0" fill="none" stroke="#89b4fa" stroke-width="48" stroke-linecap="round" />
    
    <!-- Mauve Sweeping Arc (Bottom Left) -->
    <path d="M 0 140 A 140 140 0 0 1 -140 0" fill="none" stroke="#cba6f7" stroke-width="48" stroke-linecap="round" />

    <!-- Core Floating Windows -->
    <g transform="translate(-50, -50)">
        <rect x="0" y="0" width="45" height="100" rx="12" fill="#a6e3a1" />
        <rect x="55" y="0" width="45" height="45" rx="12" fill="#fab387" />
        <rect x="55" y="55" width="45" height="45" rx="12" fill="#74c7ec" />
    </g>
  </g>
</svg>
